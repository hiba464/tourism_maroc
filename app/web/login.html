<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <div class="card">

            <h1>Welcome Back </h1>

            <p>Login to continue your Morocco journey</p>

            <form autocomplete="off">

                <input
                    id="email"
                    type="email"
                    placeholder="Email"
                    autocomplete="off">

                <input
                    id="password"
                    type="password"
                    placeholder="Password"
                    autocomplete="off">

                <button
                    type="button"
                    onclick="login()">
                    Login
                </button>

            </form>

            <a href="register.html">
                Create Account
            </a>

        </div>

    </div>

    <script src="auth.js"></script>

</body>
</html>
