<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>
        Admin Dashboard
    </title>

</head>

<body>

    <h1>
        Admin Dashboard
    </h1>
<div class="stats">

    <div class="stat-card">
        <h3 id="usersCount">0</h3>
        <p>Users</p>
    </div>

    <div class="stat-card">
        <h3 id="reservationsCount">0</h3>
        <p>Reservations</p>
    </div>

    <div class="stat-card">
        <h3 id="reviewsCount">0</h3>
        <p>Reviews</p>
    </div>

    <div class="stat-card">
        <h3 id="hotelsCount">0</h3>
        <p>Hotels</p>
    </div>

</div>



    <h2>
        Reservations
    </h2>

    <table border="1">

        <thead>

            <tr>

                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Hotel</th>
                <th>Check In</th>
                <th>Check Out</th>
                <th>Guests</th>
                <th>Action</th>

            </tr>

        </thead>
<h2>Statistics</h2>

<div id="stats"></div>

<hr>


        <tbody id="reservationsTable">

        </tbody>

    </table>

    <script src="admin.js"></script>

</body>

</html>

<style>
.stats{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:20px;

    margin-bottom:30px;
}

.stat-card{

    background:white;

    padding:20px;

    border-radius:15px;

    text-align:center;

    box-shadow:
    0 5px 15px rgba(0,0,0,.1);
}



</style>
